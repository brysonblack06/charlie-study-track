<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Sign in to the StudyTrack front-end application."
    >

    <title>StudyTrack | Sign In</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="../index.html">
                    <i class="bi bi-journal-check"></i>
                    StudyTrack
                </a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#mainNavigation"
                    aria-controls="mainNavigation"
                    aria-expanded="false"
                    aria-label="Open navigation menu"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div
                    class="collapse navbar-collapse"
                    id="mainNavigation"
                >
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a
                                class="nav-link"
                                href="../index.html"
                            >
                                Home
                            </a>
                        </li>

                        <li class="nav-item">
                            <a
                                class="nav-link"
                                href="admin.html"
                            >
                                Admin
                            </a>
                        </li>

                        <li class="nav-item">
                            <a
                                class="nav-link active"
                                href="signin.html"
                            >
                                Sign In
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="py-5 bg-light">
        <div class="container">
            <section class="content-container sign-in-card">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle display-3 text-primary"></i>

                    <h1 class="h2">Sign In</h1>

                    <p class="text-muted">
                        This is a front-end demonstration sign-in page.
                    </p>
                </div>

                <form id="sign-in-form">
                    <div class="mb-3">
                        <label
                            for="email"
                            class="form-label"
                        >
                            Email Address
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="mb-3">
                        <label
                            for="password"
                            class="form-label"
                        >
                            Password
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            required
                            minlength="6"
                            autocomplete="current-password"
                        >
                    </div>

                    <div class="form-check mb-3">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="remember-user"
                        >

                        <label
                            class="form-check-label"
                            for="remember-user"
                        >
                            Remember my email
                        </label>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100"
                    >
                        <i class="bi bi-box-arrow-in-right"></i>
                        Sign In
                    </button>
                </form>

                <div
                    id="sign-in-message"
                    class="mt-3"
                    aria-live="polite"
                ></div>
            </section>
        </div>
    </main>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p class="mb-0">
                StudyTrack — Dev Project ALFA
            </p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>

    <script src="../js/signin.js"></script>
</body>
</html>
